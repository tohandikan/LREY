<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Survivor</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    * {
      font-family: 'Press Start 2P', monospace;
      image-rendering: pixelated;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    #game-container {
      width: 100%;
      height: 100%;
      background: #1a1a2e;
    }
    
    canvas {
      display: block;
    }
    
    .pixel-border {
      box-shadow: 
        inset -4px -4px 0px 0px #1a1a2e,
        inset 4px 4px 0px 0px #4a4a6a;
    }
    
    .pixel-btn {
      background: #4a9c5d;
      box-shadow: 
        inset -3px -3px 0px 0px #2d5e38,
        inset 3px 3px 0px 0px #6bc97d;
      transition: all 0.1s;
    }
    
    .pixel-btn:hover {
      background: #5db86e;
    }
    
    .pixel-btn:active {
      box-shadow: 
        inset 3px 3px 0px 0px #2d5e38,
        inset -3px -3px 0px 0px #6bc97d;
    }
    
    .ability-card {
      background: #2a2a4a;
      border: 4px solid #4a4a6a;
      transition: all 0.2s;
    }
    
    .ability-card:hover {
      background: #3a3a5a;
      border-color: #6a6a8a;
      transform: scale(1.05);
    }
    
    .xp-bar {
      background: linear-gradient(90deg, #ffd700 0%, #ffaa00 100%);
      box-shadow: 0 0 10px #ffd700aa;
    }
    
    .health-bar {
      background: linear-gradient(90deg, #ff4444 0%, #cc2222 100%);
      box-shadow: 0 0 8px #ff4444aa;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .float-anim {
      animation: float 2s ease-in-out infinite;
    }
    
    .pulse-anim {
      animation: pulse 1s ease-in-out infinite;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="game-container">
   <canvas id="gameCanvas"></canvas><!-- UI Overlay -->
   <div id="ui-overlay" class="absolute inset-0 pointer-events-none"><!-- Top Bar -->
    <div class="absolute top-0 left-0 right-0 p-3 pointer-events-auto">
     <div class="flex justify-between items-start gap-2"><!-- Left: Level & XP -->
      <div class="flex flex-col gap-1">
       <div class="bg-black/70 px-3 py-2 pixel-border"><span class="text-yellow-400 text-xs">LV <span id="level">1</span></span>
       </div>
       <div class="bg-black/50 w-32 h-3 pixel-border overflow-hidden">
        <div id="xp-bar" class="xp-bar h-full transition-all duration-300" style="width: 0%"></div>
       </div>
      </div><!-- Center: Timer -->
      <div class="bg-black/70 px-4 py-2 pixel-border"><span class="text-white text-xs" id="timer">00:00</span>
      </div><!-- Right: Stats -->
      <div class="flex flex-col gap-1 items-end">
       <div class="bg-black/70 px-3 py-2 pixel-border flex items-center gap-2"><span class="text-red-400 text-xs">❤</span>
        <div class="bg-black/50 w-20 h-2 overflow-hidden">
         <div id="health-bar" class="health-bar h-full transition-all duration-200" style="width: 100%"></div>
        </div>
       </div>
       <div class="bg-black/70 px-3 py-1 pixel-border"><span class="text-green-400 text-xs">☠ <span id="kills">0</span></span>
       </div>
      </div>
     </div>
    </div><!-- Active Abilities Display -->
    <div id="abilities-display" class="absolute top-20 left-3 flex flex-wrap gap-1 max-w-24 pointer-events-auto">
    </div><!-- Joystick Area -->
    <div id="joystick-container" class="absolute bottom-8 left-1/2 -translate-x-1/2 pointer-events-auto">
     <div id="joystick-base" class="w-28 h-28 rounded-full bg-black/40 border-4 border-white/30 relative flex items-center justify-center">
      <div id="joystick-stick" class="w-12 h-12 rounded-full bg-white/60 border-2 border-white/80 absolute transition-none cursor-pointer"></div>
     </div>
    </div><!-- Pause Button -->
    <div class="absolute bottom-8 right-4 pointer-events-auto"><button id="pause-btn" class="pixel-btn px-3 py-2 text-white text-xs">⏸</button>
    </div>
   </div><!-- Start Screen -->
   <div id="start-screen" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center gap-6 z-50">
    <div class="float-anim">
     <h1 id="game-title" class="text-2xl md:text-4xl text-yellow-400 text-center px-4">PIXEL SURVIVOR</h1>
    </div>
    <div class="text-center">
     <p class="text-gray-400 text-xs mb-2">Survive the endless horde!</p>
     <p class="text-gray-500 text-xs">Use joystick to move</p>
    </div><button id="start-btn" class="pixel-btn px-8 py-4 text-white text-sm pulse-anim"> START GAME </button>
   </div><!-- Level Up Screen -->
   <div id="levelup-screen" class="absolute inset-0 bg-black/85 flex flex-col items-center justify-center gap-4 z-40 hidden">
    <h2 class="text-xl text-yellow-400 mb-2">LEVEL UP!</h2>
    <p class="text-gray-300 text-xs mb-4">Choose an ability:</p>
    <div id="ability-choices" class="flex flex-wrap justify-center gap-3 px-4 max-w-lg">
    </div>
   </div><!-- Game Over Screen -->
   <div id="gameover-screen" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center gap-4 z-50 hidden">
    <h2 class="text-2xl text-red-500 mb-2">GAME OVER</h2>
    <div class="bg-black/50 p-4 pixel-border text-center">
     <p class="text-white text-xs mb-2">Survived: <span id="final-time" class="text-yellow-400">00:00</span></p>
     <p class="text-white text-xs mb-2">Level: <span id="final-level" class="text-green-400">1</span></p>
     <p class="text-white text-xs">Kills: <span id="final-kills" class="text-red-400">0</span></p>
    </div><button id="restart-btn" class="pixel-btn px-6 py-3 text-white text-xs mt-4"> PLAY AGAIN </button>
   </div><!-- Pause Screen -->
   <div id="pause-screen" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center gap-4 z-40 hidden">
    <h2 class="text-xl text-white">PAUSED</h2><button id="resume-btn" class="pixel-btn px-6 py-3 text-white text-xs"> RESUME </button>
   </div>
  </div>
  <script>
    // SDK Initialization
    const defaultConfig = {
      game_title: 'PIXEL SURVIVOR',
      primary_color: '#1a1a2e',
      accent_color: '#ffd700',
      text_color: '#ffffff'
    };
    
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          const title = config.game_title || defaultConfig.game_title;
          document.getElementById('game-title').textContent = title;
          document.title = title;
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['game_title', config.game_title || defaultConfig.game_title]
        ])
      });
    }

    // Game Constants
    const ABILITIES = [
      { id: 'fireball', name: 'Fireball', desc: 'Shoots fireballs', icon: '🔥', color: '#ff6600', maxLevel: 5 },
      { id: 'lightning', name: 'Lightning', desc: 'Chain lightning', icon: '⚡', color: '#ffff00', maxLevel: 5 },
      { id: 'ice_shard', name: 'Ice Shard', desc: 'Freezing projectiles', icon: '❄️', color: '#00ccff', maxLevel: 5 },
      { id: 'poison_cloud', name: 'Poison Cloud', desc: 'Toxic area damage', icon: '☠️', color: '#00ff00', maxLevel: 5 },
      { id: 'holy_aura', name: 'Holy Aura', desc: 'Damages nearby enemies', icon: '✨', color: '#ffffaa', maxLevel: 5 },
      { id: 'shadow_blade', name: 'Shadow Blade', desc: 'Spinning blades', icon: '🗡️', color: '#8844aa', maxLevel: 5 },
      { id: 'meteor', name: 'Meteor', desc: 'Falling meteors', icon: '☄️', color: '#ff4400', maxLevel: 5 },
      { id: 'arcane_orb', name: 'Arcane Orb', desc: 'Homing orbs', icon: '🔮', color: '#aa44ff', maxLevel: 5 },
      { id: 'earthquake', name: 'Earthquake', desc: 'Ground shockwave', icon: '🌋', color: '#884422', maxLevel: 5 },
      { id: 'wind_slash', name: 'Wind Slash', desc: 'Fast wind cuts', icon: '💨', color: '#aaffaa', maxLevel: 5 },
      { id: 'blood_drain', name: 'Blood Drain', desc: 'Lifesteal attack', icon: '🩸', color: '#cc0000', maxLevel: 5 },
      { id: 'spirit_wolf', name: 'Spirit Wolf', desc: 'Summon wolves', icon: '🐺', color: '#6688cc', maxLevel: 5 },
      { id: 'thunder_strike', name: 'Thunder', desc: 'Random strikes', icon: '🌩️', color: '#ffcc00', maxLevel: 5 },
      { id: 'frost_nova', name: 'Frost Nova', desc: 'Freezing explosion', icon: '💠', color: '#88ddff', maxLevel: 5 },
      { id: 'flame_ring', name: 'Flame Ring', desc: 'Ring of fire', icon: '🔆', color: '#ff8800', maxLevel: 5 },
      { id: 'void_beam', name: 'Void Beam', desc: 'Piercing beam', icon: '🌑', color: '#440066', maxLevel: 5 },
      { id: 'health_regen', name: 'Regeneration', desc: '+HP regen', icon: '💚', color: '#44ff44', maxLevel: 5 },
      { id: 'speed_boost', name: 'Swift Feet', desc: '+Move speed', icon: '👟', color: '#44aaff', maxLevel: 5 },
      { id: 'armor', name: 'Armor', desc: '+Defense', icon: '🛡️', color: '#888888', maxLevel: 5 },
      { id: 'crit_chance', name: 'Critical', desc: '+Crit chance', icon: '💥', color: '#ff4444', maxLevel: 5 },
      { id: 'magnet', name: 'Magnet', desc: '+Pickup range', icon: '🧲', color: '#ff44ff', maxLevel: 5 },
      { id: 'luck', name: 'Lucky', desc: '+XP gain', icon: '🍀', color: '#44ff88', maxLevel: 5 }
    ];

    // Game State
    let canvas, ctx;
    let gameState = 'menu';
    let gameTime = 0;
    let lastTime = 0;
    let deltaTime = 0;
    
    const camera = { x: 0, y: 0 };
    
    const player = {
      x: 0, y: 0,
      vx: 0, vy: 0,
      speed: 120,
      health: 100,
      maxHealth: 100,
      xp: 0,
      xpToLevel: 10,
      level: 1,
      kills: 0,
      abilities: {},
      armor: 0,
      critChance: 0.05,
      xpMultiplier: 1,
      pickupRange: 50,
      regenRate: 0
    };
    
    let enemies = [];
    let projectiles = [];
    let particles = [];
    let xpOrbs = [];
    let damageNumbers = [];
    
    // Joystick
    const joystick = {
      active: false,
      baseX: 0, baseY: 0,
      stickX: 0, stickY: 0,
      dx: 0, dy: 0
    };
    
    // Ground tiles for infinite world effect
    const groundTiles = [];
    const TILE_SIZE = 64;
    const GROUND_COLORS = ['#1a2a1a', '#1e2e1e', '#162616', '#1a2618'];
    
    // Initialize
    function init() {
      canvas = document.getElementById('gameCanvas');
      ctx = canvas.getContext('2d');
      
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      
      setupJoystick();
      setupButtons();
      
      generateGroundTiles();
      
      requestAnimationFrame(gameLoop);
    }
    
    function resizeCanvas() {
      const container = document.getElementById('game-container');
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
    }
    
    function setupJoystick() {
      const base = document.getElementById('joystick-base');
      const stick = document.getElementById('joystick-stick');
      
      const handleStart = (e) => {
        e.preventDefault();
        joystick.active = true;
        const rect = base.getBoundingClientRect();
        joystick.baseX = rect.left + rect.width / 2;
        joystick.baseY = rect.top + rect.height / 2;
        handleMove(e);
      };
      
      const handleMove = (e) => {
        if (!joystick.active) return;
        e.preventDefault();
        
        const touch = e.touches ? e.touches[0] : e;
        const dx = touch.clientX - joystick.baseX;
        const dy = touch.clientY - joystick.baseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxDist = 40;
        
        if (dist > maxDist) {
          joystick.dx = (dx / dist) * maxDist;
          joystick.dy = (dy / dist) * maxDist;
        } else {
          joystick.dx = dx;
          joystick.dy = dy;
        }
        
        stick.style.transform = `translate(${joystick.dx}px, ${joystick.dy}px)`;
        
        // Normalize for movement
        if (dist > 5) {
          joystick.stickX = dx / Math.max(dist, maxDist);
          joystick.stickY = dy / Math.max(dist, maxDist);
        } else {
          joystick.stickX = 0;
          joystick.stickY = 0;
        }
      };
      
      const handleEnd = (e) => {
        joystick.active = false;
        joystick.stickX = 0;
        joystick.stickY = 0;
        joystick.dx = 0;
        joystick.dy = 0;
        stick.style.transform = 'translate(0, 0)';
      };
      
      base.addEventListener('touchstart', handleStart, { passive: false });
      base.addEventListener('touchmove', handleMove, { passive: false });
      base.addEventListener('touchend', handleEnd);
      base.addEventListener('touchcancel', handleEnd);
      
      base.addEventListener('mousedown', handleStart);
      window.addEventListener('mousemove', handleMove);
      window.addEventListener('mouseup', handleEnd);
      
      // Keyboard support
      const keys = {};
      window.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        updateKeyboardJoystick();
      });
      window.addEventListener('keyup', (e) => {
        keys[e.key.toLowerCase()] = false;
        updateKeyboardJoystick();
      });
      
      function updateKeyboardJoystick() {
        let kx = 0, ky = 0;
        if (keys['w'] || keys['arrowup']) ky = -1;
        if (keys['s'] || keys['arrowdown']) ky = 1;
        if (keys['a'] || keys['arrowleft']) kx = -1;
        if (keys['d'] || keys['arrowright']) kx = 1;
        
        if (kx !== 0 || ky !== 0) {
          const len = Math.sqrt(kx * kx + ky * ky);
          joystick.stickX = kx / len;
          joystick.stickY = ky / len;
        } else if (!joystick.active) {
          joystick.stickX = 0;
          joystick.stickY = 0;
        }
      }
    }
    
    function setupButtons() {
      document.getElementById('start-btn').onclick = startGame;
      document.getElementById('restart-btn').onclick = startGame;
      document.getElementById('pause-btn').onclick = togglePause;
      document.getElementById('resume-btn').onclick = togglePause;
    }
    
    function generateGroundTiles() {
      groundTiles.length = 0;
      for (let i = 0; i < 200; i++) {
        groundTiles.push({
          x: (Math.random() - 0.5) * 4000,
          y: (Math.random() - 0.5) * 4000,
          size: 8 + Math.random() * 16,
          color: GROUND_COLORS[Math.floor(Math.random() * GROUND_COLORS.length)],
          type: Math.random() > 0.7 ? 'rock' : 'grass'
        });
      }
    }
    
    function startGame() {
      gameState = 'playing';
      gameTime = 0;
      
      player.x = 0;
      player.y = 0;
      player.health = 100;
      player.maxHealth = 100;
      player.xp = 0;
      player.xpToLevel = 10;
      player.level = 1;
      player.kills = 0;
      player.abilities = {};
      player.speed = 120;
      player.armor = 0;
      player.critChance = 0.05;
      player.xpMultiplier = 1;
      player.pickupRange = 50;
      player.regenRate = 0;
      
      enemies = [];
      projectiles = [];
      particles = [];
      xpOrbs = [];
      damageNumbers = [];
      
      // Give starter ability
      const starterAbility = ABILITIES[0]; // Fireball
      player.abilities[starterAbility.id] = 1;
      
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('gameover-screen').classList.add('hidden');
      document.getElementById('levelup-screen').classList.add('hidden');
      
      updateUI();
      updateAbilitiesDisplay();
    }
    
    function togglePause() {
      if (gameState === 'playing') {
        gameState = 'paused';
        document.getElementById('pause-screen').classList.remove('hidden');
      } else if (gameState === 'paused') {
        gameState = 'playing';
        document.getElementById('pause-screen').classList.add('hidden');
      }
    }
    
    function gameOver() {
      gameState = 'gameover';
      document.getElementById('final-time').textContent = formatTime(gameTime);
      document.getElementById('final-level').textContent = player.level;
      document.getElementById('final-kills').textContent = player.kills;
      document.getElementById('gameover-screen').classList.remove('hidden');
    }
    
    function gameLoop(timestamp) {
      deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      if (gameState === 'playing') {
        gameTime += deltaTime;
        update(deltaTime);
      }
      
      render();
      requestAnimationFrame(gameLoop);
    }
    
    function update(dt) {
      // Player movement
      player.vx = joystick.stickX * player.speed;
      player.vy = joystick.stickY * player.speed;
      player.x += player.vx * dt;
      player.y += player.vy * dt;
      
      // Health regen
      if (player.regenRate > 0) {
        player.health = Math.min(player.maxHealth, player.health + player.regenRate * dt);
      }
      
      // Camera follow
      camera.x = player.x - canvas.width / 2;
      camera.y = player.y - canvas.height / 2;
      
      // Spawn enemies
      spawnEnemies(dt);
      
      // Update enemies
      updateEnemies(dt);
      
      // Update abilities
      updateAbilities(dt);
      
      // Update projectiles
      updateProjectiles(dt);
      
      // Update particles
      updateParticles(dt);
      
      // Update XP orbs
      updateXPOrbs(dt);
      
      // Update damage numbers
      updateDamageNumbers(dt);
      
      // Check collisions
      checkCollisions();
      
      // Update UI
      updateUI();
    }
    
    let spawnTimer = 0;
    function spawnEnemies(dt) {
      const spawnRate = Math.max(0.3, 2 - gameTime / 60);
      spawnTimer += dt;
      
      if (spawnTimer >= spawnRate) {
        spawnTimer = 0;
        
        const count = Math.min(5, 1 + Math.floor(gameTime / 30));
        for (let i = 0; i < count; i++) {
          spawnEnemy();
        }
      }
    }
    
    function spawnEnemy() {
      const angle = Math.random() * Math.PI * 2;
      const dist = 400 + Math.random() * 200;
      
      const difficulty = 1 + gameTime / 60;
      const type = Math.random();
      
      let enemy;
      if (type < 0.6) {
        // Basic zombie
        enemy = {
          x: player.x + Math.cos(angle) * dist,
          y: player.y + Math.sin(angle) * dist,
          size: 12,
          speed: 30 + Math.random() * 20,
          health: 20 * difficulty,
          maxHealth: 20 * difficulty,
          damage: 10,
          color: '#44aa44',
          xp: 1,
          type: 'zombie'
        };
      } else if (type < 0.85) {
        // Fast bat
        enemy = {
          x: player.x + Math.cos(angle) * dist,
          y: player.y + Math.sin(angle) * dist,
          size: 8,
          speed: 80 + Math.random() * 30,
          health: 10 * difficulty,
          maxHealth: 10 * difficulty,
          damage: 5,
          color: '#8844aa',
          xp: 2,
          type: 'bat'
        };
      } else {
        // Tank skeleton
        enemy = {
          x: player.x + Math.cos(angle) * dist,
          y: player.y + Math.sin(angle) * dist,
          size: 16,
          speed: 20 + Math.random() * 10,
          health: 50 * difficulty,
          maxHealth: 50 * difficulty,
          damage: 20,
          color: '#ccccaa',
          xp: 5,
          type: 'skeleton'
        };
      }
      
      enemies.push(enemy);
    }
